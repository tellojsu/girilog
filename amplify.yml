version: 1
frontend:
  phases:
    preBuild:
      commands:
        - export NEXT_TELEMETRY_DISABLED=1
        - npm install
        - echo "Fetching secrets from SSM..."
        - |
          for secret in $(aws ssm get-parameters-by-path \
            --path /amplify/d1z9nzoixe09ia/main/ \
            --with-decryption \
            --region us-west-2 \
            --query "Parameters[*].{Name:Name}" \
            --output text); do

              key=$(basename "$secret")
              value=$(aws ssm get-parameter \
                --name "$secret" \
                --with-decryption \
                --region us-west-2 \
                --query "Parameter.Value" \
                --output text)

              echo "exporting $key"
              echo "$key=$value" >> .env
              export "$key=$value"
          done
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
